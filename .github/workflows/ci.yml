name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: sudo apt-get update -qq && sudo apt-get install -y lua-check
      - name: Lint
        run: luacheck . --no-color
